name: SAST with Semgrep

on:
  push:
    branches: [ master ]   # ya main (jo bhi tumhari default branch hai)
  pull_request:
    branches: [ master ]

jobs:
  semgrep:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=p/python \
            --sarif \
            --output=semgrep.sarif \
            --exclude venv \
            .

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
